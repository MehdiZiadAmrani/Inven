spring.application.name=inven

# ─── Database connection ───────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/invenDB}
spring.datasource.username=postgres
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:inven}

spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── SQL Initialization ──────────────────────────────────────────
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ─── JWT ───────────────────────────────────────────────────────
# Valid Base64 secret (32 bytes encoded in base64)
jwt.secret=${JWT_SECRET:changeme-inven-base64-secret-key-must-change}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ─── Server ────────────────────────────────────────────────────
server.port=8080

# ─── Actuator ────────────────────────────────────────────────────
management.endpoints.web.base-path=/
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
